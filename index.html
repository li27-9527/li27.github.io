<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>li27</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      background: #f7f4ef;
      color: #202124;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(40px, 8vw, 84px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 0;
      color: #4f545c;
      font-size: 18px;
      line-height: 1.7;
    }

    .tag {
      display: inline-block;
      margin-bottom: 20px;
      color: #0f766e;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #171717;
        color: #f4f1ea;
      }

      p {
        color: #c8c3b9;
      }

      .tag {
        color: #5eead4;
      }
    }
  </style>
</head>
<body>
  <main>
    <span class="tag">GitHub Pages</span>
    <h1>li27</h1>
    <p>Your GitHub Pages site is initialized. This page can grow into a portfolio, blog, project index, or a fuller personal homepage.</p>
  </main>
</body>
</html>
